name: Release

on:
  release:
    branches:
      - main
    types: [released]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o sona-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/sona
          go build -ldflags="-s -w" -o ghhelp-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/ghhelp
          go build -ldflags="-s -w" -o fjf-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/fjf

      - uses: actions/upload-artifact@v4
        with:
          name: go-utilities-${{ matrix.suffix }}
          path: |
            sona-${{ matrix.suffix }}${{ matrix.ext }}
            ghhelp-${{ matrix.suffix }}${{ matrix.ext }}
            fjf-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          sparse-checkout: CHANGELOG.md

      - name: Upload binaries and set release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in artifacts/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$file" --repo "${{ github.repository }}"
          done
          gh release edit "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --notes-file CHANGELOG.md
